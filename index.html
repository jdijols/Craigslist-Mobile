<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/cl-icon.png" />
    <link rel="apple-touch-icon" href="/assets/cl-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <title>Craigslist iOS — Livefront</title>
    <meta name="description" content="Reimagining the craigslist app — Same Brand, Modern Design. Presented by Livefront." />
    <!-- Open Graph / share banner. Set VITE_SITE_URL at build for absolute og:image (e.g. https://yoursite.vercel.app) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reimagining the craigslist app — Livefront" />
    <meta property="og:description" content="Same Brand, Modern Design. A ground-up redesign of the craigslist mobile experience." />
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reimagining the craigslist app — Livefront" />
    <meta name="twitter:description" content="Same Brand, Modern Design. A ground-up redesign of the craigslist mobile experience." />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=Onest:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Safari 26+ (iOS 26): fixed elements for status bar & home indicator tinting -->
    <div id="safari-status-bar-tint" aria-hidden="true"></div>
    <div id="safari-home-indicator-tint" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
